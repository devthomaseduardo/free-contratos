
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContractForge Pro | Thomas Eduardo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Biblioteca para geração de PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              neon: {
                purple: '#a855f7',
                green: '#10b981', // Emerald adjustment
                cyan: '#06b6d4',
                dark: '#020617',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['Fira Code', 'monospace'],
              serif: ['Times New Roman', 'serif']
            },
            animation: {
              'in': 'fadeIn .3s ease-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;600&display=swap');
      
      body {
        background-color: #020617;
        color: #f8fafc;
      }

      /* Custom Scrollbar - Slim & Modern */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #334155; 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569; 
      }

      /* Utilitários de texto jurídico */
      .indent-8 { text-indent: 2rem; }

      /* Animations */
      .slide-in-from-top-4 { --tw-enter-translate-y: -1rem; }
      .fade-in { --tw-enter-opacity: 0; opacity: 1; transition: opacity 0.3s; }

      @media print {
        @page {
            size: A4;
            margin: 0; /* Remove margens do browser, controlamos no CSS */
        }
        
        body {
          background-color: white !important;
          color: black !important;
          margin: 0;
          padding: 0;
          overflow: visible;
        }
        
        body * {
          visibility: hidden;
        }
        
        #printable-content, #printable-content * {
          visibility: visible;
        }
        
        #printable-content {
          position: absolute;
          left: 0;
          top: 0;
          width: 210mm !important;
          min-height: 297mm !important;
          margin: 0 !important;
          padding: 2.5cm !important;
          box-shadow: none !important;
          border: none !important;
          /* Ensure styles match screen render for consistency */
          background-color: white !important;
          print-color-adjust: exact;
          -webkit-print-color-adjust: exact;
        }

        /* Remove backgrounds and shadows for clean print */
        .bg-gray-50, .shadow-2xl {
            background-color: transparent !important;
            box-shadow: none !important;
            border: none !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
