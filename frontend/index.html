<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>paper-contracts | by devthomas</title>
    <link rel="icon" type="image/png" href="/paper‑contracts.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              midnight: {
                DEFAULT: '#020305',
                lighter: '#080a0e',
                deep: '#010102',
              },
              azure: {
                DEFAULT: '#1e40af', 
                light: '#3b82f6',
                dark: '#1d4ed8',
              },
              gold: {
                DEFAULT: '#c5a059',
                light: '#d4b47a',
                dark: '#a68242',
              },
            },
            fontFamily: {
              sans: ['Outfit', 'Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
              serif: ['Lora', 'Times New Roman', 'serif'],
            },
            boxShadow: {
              'premium': '0 20px 50px -12px rgba(0, 0, 0, 0.7)',
              'soft-glow': '0 0 40px rgba(30, 64, 175, 0.1)',
            },
            animation: {
              'in-scale': 'inScale .4s cubic-bezier(0.16, 1, 0.3, 1)',
              'float': 'float 6s ease-in-out infinite',
              'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
            },
            keyframes: {
              inScale: {
                '0%': { opacity: '0', transform: 'scale(0.98)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            },
          },
        },
      };
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;700&display=swap');

      body {
        background-color: #020305;
        color: #cbd5e1;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .premium-glass {
        background: rgba(8, 10, 14, 0.96);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.03);
      }

      .text-balance {
        text-wrap: balance;
      }

      .premium-border {
        border-color: rgba(255, 255, 255, 0.05);
      }

      /* SCROLLBAR REFINEMENT */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.2);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.05);
        border-radius: 20px;
        border: 2px solid transparent;
        background-clip: content-box;
        transition: all 0.3s;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #1e40af;
        background-clip: content-box;
      }

      .indent-8 {
        text-indent: 2rem;
      }

      .slide-in-from-top-4 {
        --tw-enter-translate-y: -1rem;
      }
      .fade-in {
        --tw-enter-opacity: 0;
        opacity: 1;
        transition: opacity 0.3s;
      }

      @media print {
        @page {
          size: A4;
          margin: 20mm 20mm 20mm 25mm; /* Top, Right, Bottom, Left */
        }

        body {
          background-color: white !important;
          color: black !important;
          margin: 0;
          padding: 0;
          overflow: visible;
        }

        body * {
          visibility: hidden;
        }

        #printable-content,
        #printable-content * {
          visibility: visible;
        }

        #printable-content {
          position: absolute;
          left: 0;
          top: 0;
          width: 210mm !important;
          min-height: 297mm !important;
          box-shadow: none !important;
          margin: 0 !important;
          padding: 0 !important;
          background-color: white !important;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }

      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
